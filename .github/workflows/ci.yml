name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    name: Tests and static analysis
    runs-on: ubuntu-latest

    env:
      APP_ENV: test
      APP_DEBUG: 1
      DATABASE_URL: mysql://symfony:symfony@127.0.0.1:3306/symfony_test?serverVersion=8.4&charset=utf8mb4

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: symfony_test
          MYSQL_USER: symfony
          MYSQL_PASSWORD: symfony
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -usymfony -psymfony"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: ctype, iconv, intl, mbstring, pdo_mysql
          coverage: none

      - name: Validate Composer files
        run: composer validate --strict --no-check-publish

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Lint YAML
        run: php bin/console lint:yaml config --env=test

      - name: Lint Twig
        run: php bin/console lint:twig templates --env=test

      - name: Lint container
        run: php bin/console lint:container --env=test

      - name: Run PHPStan
        run: ./vendor/bin/phpstan analyse --no-progress

      - name: Run PHPUnit
        run: ./vendor/bin/phpunit
